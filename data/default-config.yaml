# gowl - Default YAML Configuration
# GObject Wayland Compositor
# Copyright (C) 2026  Zach Podbielniak
#
# Search order:
#   1. ./data/config.yaml
#   2. ~/.config/gowl/config.yaml
#   3. /etc/gowl/config.yaml
#   4. /usr/local/gowl/config.yaml
#
# Generate this file with: gowl --generate-yaml-config > ~/.config/gowl/config.yaml
#
# NOTE: All property keys must be at the root level (flat mapping).
# Key names use hyphens (log-level, not log_level).

# Set to true to ignore all YAML values and keep defaults.
# Useful when relying entirely on C config (equivalent to --no-yaml-config).
# ignore_yaml: true

# Compositor settings
log-level: "warning"
log-file: "~/.config/gowl/gowl.log"
repeat-rate: 25
repeat-delay: 600
terminal: "gst"
menu: "wofi --show drun"
sloppyfocus: true
# Power off the internal laptop panel (eDP/LVDS/DSI) while the lid is
# shut and an external display is connected.  Set false to keep driving
# a closed-lid panel.
manage_lid: true

# Appearance
border-width: 2
border-color-focus: "#005577"
border-color-unfocus: "#444444"
border-color-urgent: "#ff0000"

# Layout
mfact: 0.55
nmaster: 1

# Tags
tag-count: 9

# Keybind format: "Modifier+Modifier+Key": { action: <action>, arg: "<argument>" }
#
# Modifier names: Super (Logo), Shift, Ctrl (Control), Alt (Mod1), Mod2, Mod3, Mod5
# Action values:  spawn, kill_client, toggle_float, toggle_fullscreen, focus_stack,
#                 focus_monitor, tag_view, tag_set, tag_toggle_view, tag_toggle,
#                 move_to_monitor, set_mfact, inc_nmaster, set_layout, cycle_layout,
#                 set_split, zoom, quit, reload_config, ipc_command, lock, custom
keybinds:
  # Launch applications
  "Super+Return": { action: spawn, arg: "gst" }
  "Super+p": { action: spawn, arg: "wofi --show drun" }
  "Super+Shift+p": { action: spawn, arg: "wofi --show run" }

  # Client management
  "Super+Shift+c": { action: kill_client }
  "Super+space": { action: toggle_float }
  "Super+Shift+space": { action: toggle_fullscreen }
  "Super+Shift+Return": { action: zoom }

  # Focus navigation
  "Super+j": { action: focus_stack, arg: "+1" }
  "Super+k": { action: focus_stack, arg: "-1" }

  # Master area adjustment
  "Super+h": { action: set_mfact, arg: "-0.05" }
  "Super+l": { action: set_mfact, arg: "+0.05" }
  "Super+i": { action: inc_nmaster, arg: "+1" }
  "Super+d": { action: inc_nmaster, arg: "-1" }

  # Layout selection
  "Super+t": { action: set_layout, arg: "tile" }
  "Super+f": { action: set_layout, arg: "float" }
  "Super+m": { action: set_layout, arg: "monocle" }
  "Super+v": { action: set_split, arg: "vsplit" }
  "Super+Shift+v": { action: set_split, arg: "normal" }

  # Multi-monitor
  "Super+comma": { action: focus_monitor, arg: "-1" }
  "Super+period": { action: focus_monitor, arg: "+1" }
  "Super+Shift+comma": { action: move_to_monitor, arg: "-1" }
  "Super+Shift+period": { action: move_to_monitor, arg: "+1" }

  # View all tags / tag all
  "Super+0": { action: tag_view, arg: "0" }
  "Super+Shift+0": { action: tag_set, arg: "0" }

  # Tag switching (Super+1 through Super+9)
  # arg is the tag bitmask: tag N = 1 << (N-1)
  "Super+1": { action: tag_view, arg: "1" }
  "Super+2": { action: tag_view, arg: "2" }
  "Super+3": { action: tag_view, arg: "4" }
  "Super+4": { action: tag_view, arg: "8" }
  "Super+5": { action: tag_view, arg: "16" }
  "Super+6": { action: tag_view, arg: "32" }
  "Super+7": { action: tag_view, arg: "64" }
  "Super+8": { action: tag_view, arg: "128" }
  "Super+9": { action: tag_view, arg: "256" }

  # Tag assignment (Super+Shift+1 through Super+Shift+9)
  "Super+Shift+1": { action: tag_set, arg: "1" }
  "Super+Shift+2": { action: tag_set, arg: "2" }
  "Super+Shift+3": { action: tag_set, arg: "4" }
  "Super+Shift+4": { action: tag_set, arg: "8" }
  "Super+Shift+5": { action: tag_set, arg: "16" }
  "Super+Shift+6": { action: tag_set, arg: "32" }
  "Super+Shift+7": { action: tag_set, arg: "64" }
  "Super+Shift+8": { action: tag_set, arg: "128" }
  "Super+Shift+9": { action: tag_set, arg: "256" }

  # Tag toggle view (Super+Ctrl+1 through Super+Ctrl+9)
  "Super+Ctrl+1": { action: tag_toggle_view, arg: "1" }
  "Super+Ctrl+2": { action: tag_toggle_view, arg: "2" }
  "Super+Ctrl+3": { action: tag_toggle_view, arg: "4" }
  "Super+Ctrl+4": { action: tag_toggle_view, arg: "8" }
  "Super+Ctrl+5": { action: tag_toggle_view, arg: "16" }
  "Super+Ctrl+6": { action: tag_toggle_view, arg: "32" }
  "Super+Ctrl+7": { action: tag_toggle_view, arg: "64" }
  "Super+Ctrl+8": { action: tag_toggle_view, arg: "128" }
  "Super+Ctrl+9": { action: tag_toggle_view, arg: "256" }

  # Tag toggle on client (Super+Shift+Ctrl+1 through Super+Shift+Ctrl+9)
  "Super+Shift+Ctrl+1": { action: tag_toggle, arg: "1" }
  "Super+Shift+Ctrl+2": { action: tag_toggle, arg: "2" }
  "Super+Shift+Ctrl+3": { action: tag_toggle, arg: "4" }
  "Super+Shift+Ctrl+4": { action: tag_toggle, arg: "8" }
  "Super+Shift+Ctrl+5": { action: tag_toggle, arg: "16" }
  "Super+Shift+Ctrl+6": { action: tag_toggle, arg: "32" }
  "Super+Shift+Ctrl+7": { action: tag_toggle, arg: "64" }
  "Super+Shift+Ctrl+8": { action: tag_toggle, arg: "128" }
  "Super+Shift+Ctrl+9": { action: tag_toggle, arg: "256" }

  # Session
  "Super+Shift+q": { action: quit }
  "Super+Shift+r": { action: reload_config }
  "Super+Shift+l": { action: lock }

# Window rules
# Each rule matches clients by app-id and/or title, then applies settings.
# Fields:
#   app-id:   (string) Wayland app_id to match (omitted = match any)
#   title:    (string) Window title pattern to match (omitted = match any)
#   regex:    (bool)   Interpret app-id/title as PCRE regexes (default: glob)
#   tags:     (int)    Bitmask of tags to assign (0 = no tag override)
#   floating: (bool)   Whether the client should float
#   monitor:  (int)    Monitor index to place on (-1 = default)
#   width:    (int)    Explicit pixel width for floated matches (0 = natural)
#   height:   (int)    Explicit pixel height for floated matches (0 = natural)
#   center:   (bool)   Center floated match on target monitor (default true)
rules:
  # Tag assignment
  - app-id: "firefox"
    tags: 2
  - app-id: "thunderbird"
    tags: 4

  # Modal / popup auto-float.  Rules for apps whose window
  # should stay above the tiled Emacs frame rather than join
  # the layout.
  - app-id: "zoom"
    floating: true
  - title: "^Zoom Meeting$"
    floating: true
    regex: true
  - title: "Join Meeting"
    floating: true
  - app-id: "ch.protonmail.protonmail-bridge"
    floating: true
  - app-id: "org.keepassxc.KeePassXC"
    title: "Unlock"
    floating: true
  - app-id: "pinentry"
    floating: true
  - app-id: "pinentry-gtk-2"
    floating: true
  - app-id: "pinentry-qt"
    floating: true
  - app-id: "pavucontrol"
    floating: true
  - app-id: "nm-connection-editor"
    floating: true
  - app-id: "blueman-manager"
    floating: true
  - title: "^Open File$"
    floating: true
  - title: "^Save As$"
    floating: true
  - title: "^Print$"
    floating: true
  - title: "^Preferences$"
    floating: true
  - app-id: "imv"
    floating: true
  - app-id: "feh"
    floating: true

# Guake-style dropdown windows
# Each entry is lazy-spawned on first keybind press, captured via the
# compositor's prefloat-hint mechanism, then toggled show/hide on
# subsequent presses.  The window follows the currently focused output.
# Fields:
#   name:       (string)  Unique identifier for the dropdown
#   spawn-cmd:  (string)  Shell command spawned on first toggle
#   keybind:    (string)  Keybind to toggle (e.g. "Super+grave")
#   width-pct:  (float)   Fractional width (0.0–1.0) of target monitor
#   height-pct: (float)   Fractional height (0.0–1.0) of target monitor
#   width:      (int)     Absolute width in pixels (overrides width-pct)
#   height:     (int)     Absolute height in pixels (overrides height-pct)
#   anchor:     (string)  "top" | "bottom" | "left" | "right"
dropdowns:
  - name: term
    spawn-cmd: "gst"
    keybind: "Super+grave"
    width-pct: 1.0
    height-pct: 0.4
    anchor: top

# Autostart commands (executed once at compositor startup)
autostart: []

# Monitor configuration (keyed by output name).  Every field is
# independently optional -- unspecified fields are left at the
# compositor's defaults, so you can override just one knob (e.g.
# transform for a tablet that boots in the wrong orientation).
# Changes take effect live on `M-x cmacs-gowl-reload-config` /
# the equivalent `cmacsgi compositor reload` and `Mod+R` keybind.
#
# Output names come from the kernel/DRM (e.g. eDP-1, HDMI-A-1,
# DP-2, headless-1).  Discover the live set via
# `M-: (cmacs-gowl-list-monitors)` or `cmacsgi monitor list`.
#
# Fields:
#   width:     (int)    Preferred mode width  (must pair with height)
#   height:    (int)    Preferred mode height
#   refresh:   (float)  Refresh rate in Hz (0 / omitted = preferred)
#   x:         (int)    Position in layout coordinates
#   y:         (int)    Position in layout coordinates
#   scale:     (float)  HiDPI scale factor (e.g. 1.0, 1.5, 2.0)
#   enabled:   (bool)   true to power on, false to disable
#   transform: (int|string)  wl_output transform:
#                            0 / normal       (no rotation)
#                            1 / 90           (rotated 90 deg CCW)
#                            2 / 180          (upside down)
#                            3 / 270          (rotated 90 deg CW)
#                            4 / flipped      (horizontal mirror)
#                            5 / flipped-90
#                            6 / flipped-180
#                            7 / flipped-270
#
# Example:
#   monitors:
#     eDP-1:
#       transform: 90        # mobile screen: boot already-rotated
#     HDMI-A-1:
#       width: 1920
#       height: 1080
#       refresh: 60.0
#       x: 1080              # placed to the right of eDP-1 (rotated)
#       y: 0
#       scale: 1.0
monitors: {}

# Module configuration
# Each key is a module name; nested values are passed to the module's configure() method.
modules:
  vanitygaps:
    enabled: true
    # Shorthand: inner-gap / outer-gap set both axes.
    # Per-axis: inner-h, inner-v, outer-h, outer-v override shorthand.
    inner-gap: 5
    outer-gap: 5
  wallpaper:
    enabled: true
    # Absolute path to image file; empty = no wallpaper (solid root color)
    path: "~/Pictures/wallpaper.png"
    # Scaling mode: fill | fit | center | stretch | tile
    mode: fill
  bar:
    enabled: false
    height: 28
    # Background with alpha for transparency (8-digit hex = RRGGBBAA)
    bg-color: "#1e1e2ecc"
    fg-color: "#cdd6f4"
    font: "monospace"
    font-size: 13
    # Right-side widgets (space-separated): cpu memory disk battery clock
    widgets: "cpu memory disk battery clock"
    # Per-widget colors (optional, falls back to fg-color)
    # cpu-color: "#a6e3a1"
    # memory-color: "#89b4fa"
    # disk-color: "#f9e2af"
    # battery-color: "#94e2d5"
    # clock-color: "#cdd6f4"
  alpha:
    enabled: false
    # Opacity for the focused window (0.0 = transparent, 1.0 = opaque)
    focused-alpha: 1.0
    # Opacity for unfocused windows
    unfocused-alpha: 0.8
  pertag:
    enabled: false
  autostart:
    enabled: true
  scratchpad:
    enabled: false
  swallow:
    enabled: false
  copyhighlight:
    enabled: false
  screenlock:
    enabled: false
    pam-service: "gowl"
    auto-lock-timeout: 300
    bg-color: "#1e1e2e"
    text-color: "#cdd6f4"
    indicator-color: "#89b4fa"
    error-color: "#f38ba8"
    font: "monospace"
    font-size: 24
  mcp:
    enabled: false
    # Transport: Unix socket for stdio relay (gowl-mcp binary)
    transport-stdio: true
    # Transport: HTTP+SSE (direct connections)
    transport-http: false
    http-host: "127.0.0.1"
    http-port: 8716
    # http-auth-token: "your-secret-here"
    # Allowed tools (all enabled by default; comment out to disable)
    # tools: |
    #   list_clients
    #   list_monitors
    #   get_tag_state
    #   get_config
    #   list_keybinds
    #   list_modules
    #   get_focused_client
    #   focus_client
    #   close_client
    #   move_client_to_tag
    #   set_client_state
    #   resize_client
    #   move_client
    #   swap_clients
    #   zoom_client
    #   view_tag
    #   toggle_tag_view
    #   set_client_tags
    #   set_mfact
    #   set_nmaster
    #   add_rule
    #   add_keybind
    #   spawn
    #   compositor_quit
    #   send_key
    #   send_text
    #   send_mouse
    #   send_mouse_move
    #   send_scroll
    #   screenshot_client
    #   screenshot_monitor
    #   screenshot_region
    #   get_client_process_info
    #   signal_client
    #   describe_desktop
    #   find_window
