# xdg-desktop-portal routing for a gowl / cmacs --gowl session.
#
# Pin InputCapture and RemoteDesktop to the gowl backend (only gowl
# implements them for wlroots; GNOME's backend needs Mutter).  Everything
# else (ScreenCast, Screenshot, ...) falls through to xdg-desktop-portal-wlr,
# which already provides them.
#
# Install as $XDG_CONFIG_HOME/xdg-desktop-portal/portals.conf or
# /etc/xdg-desktop-portal/gowl-portals.conf (named after the desktop:
# x-d-p reads <desktop>-portals.conf when XDG_CURRENT_DESKTOP contains it).
[preferred]
default=wlr
org.freedesktop.impl.portal.InputCapture=gowl
org.freedesktop.impl.portal.RemoteDesktop=gowl
